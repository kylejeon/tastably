name: Upload Test Results to Testably

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Tests
        run: |
          # Your test commands here
          npm test
      
      - name: Upload Results to Testably
        if: always()
        run: |
          curl -X POST https://ahzfskzuyzcmgilcvozn.supabase.co/functions/v1/upload-ci-results \
            -H "Authorization: Bearer testably_516a53c7b4bc4a7689beea2b6f46fd4f" \
            -H "Content-Type: application/json" \
            -d '{
              "run_id": "${{ github.run_id }}",
              "results": [
                {
                  "test_case_id": "test-case-uuid",
                  "status": "passed",
                  "note": "Test passed successfully",
                  "elapsed": 1.5,
                  "author": "GitHub Actions"
                }
              ]
            }'
