name: Upload Test Results to Testably

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Tests
        run: |
          # Your test commands here
          npm test
      
      - name: Upload Results to Testably
        if: always()
        env:
          TESTABLY_URL: ${{ secrets.TESTABLY_URL }}
          TESTABLY_TOKEN: ${{ secrets.TESTABLY_TOKEN }}
        run: |
          curl -X POST "$TESTABLY_URL" \
            -H "Authorization: Bearer $TESTABLY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "run_id": "YOUR_RUN_ID",
              "results": [
                {
                  "test_case_id": "SUI-1",
                  "status": "passed",
                  "note": "Test passed successfully",
                  "elapsed": 1.5,
                  "author": "GitHub Actions"
                }
              ]
            }'